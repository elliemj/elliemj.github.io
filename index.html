<script>
    const heart = document.querySelector('#title-heart');
    const card = document.querySelector('#main-card');

    document.addEventListener('mousemove', (e) => {
        const mx = e.clientX;
        const my = e.clientY;

        // --- Heart: tug toward cursor ---
        const hr = heart.getBoundingClientRect();
        const hcx = hr.left + hr.width / 2;
        const hcy = hr.top + hr.height / 2;
        const hdx = mx - hcx;
        const hdy = my - hcy;
        const hdist = Math.sqrt(hdx * hdx + hdy * hdy);
        const maxTug = 4;
        const tugScale = Math.min(hdist / 300, 1);
        const tx = (hdx / hdist) * maxTug * tugScale;
        const ty = (hdy / hdist) * maxTug * tugScale;
        heart.style.transform = `translate(${tx}px, ${ty}px)`;

        // --- Card: shadow opposite to cursor ---
        const cr = card.getBoundingClientRect();
        const ccx = cr.left + cr.width / 2;
        const ccy = cr.top + cr.height / 2;
        const cdx = mx - ccx;
        const cdy = my - ccy;
        const cdist = Math.sqrt(cdx * cdx + cdy * cdy);
        const maxShadow = 8;
        const shadowScale = Math.min(cdist / 500, 1);
        const sx = -(cdx / cdist) * maxShadow * shadowScale;
        const sy = -(cdy / cdist) * maxShadow * shadowScale;
        const blur = 10 + shadowScale * 10;
        const opacity = 0.04 + shadowScale * 0.05;
        card.style.boxShadow = `${sx}px ${sy}px ${blur}px rgba(0,0,0,${opacity.toFixed(2)})`;
    });
</script>
